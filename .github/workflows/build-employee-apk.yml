name: Build Employee Test APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android-employee-test/**"
      - ".github/workflows/build-employee-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build installable debug APK
        run: gradle -p android-employee-test :app:assembleDebug --no-daemon

      - name: Prepare APK
        run: cp android-employee-test/app/build/outputs/apk/debug/app-debug.apk damasio-os-mobile-v52.0.1.apk

      - uses: actions/upload-artifact@v4
        with:
          name: damasio-os-mobile-v52.0.1
          path: damasio-os-mobile-v52.0.1.apk
          if-no-files-found: error
          retention-days: 30
